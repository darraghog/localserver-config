# n8n with SQLite (no Postgres pull). UI: http://<host>:5678 | HTTPS: https://<host>:8444
# For Postgres, uncomment the postgres service and DB_* env vars, and add depends_on.
services:
  n8n:
    image: docker.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - N8N_PROTOCOL=https
      - N8N_PROXY_HOPS=1
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-https://localhost:8444}
    extra_hosts:
      - "${N8N_HOST:-localhost}:host-gateway"
    # Postgres (uncomment when storage I/O is fixed):
    # depends_on:
    #   - postgres
    # environment:
    #   - DB_TYPE=postgresdb
    #   - DB_POSTGRESDB_HOST=postgres
    #   - DB_POSTGRESDB_DATABASE=n8n
    #   - DB_POSTGRESDB_USER=n8n
    #   - DB_POSTGRESDB_PASSWORD=n8n
    restart: unless-stopped

  # postgres:
  #   image: docker.io/library/postgres:15-alpine
  #   environment:
  #     POSTGRES_USER: n8n
  #     POSTGRES_PASSWORD: n8n
  #     POSTGRES_DB: n8n
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  n8n-data: {}
  # postgres-data: {}
