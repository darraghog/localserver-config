# n8n with SQLite (default). UI: http://<host>:5678 | HTTPS: https://<host>:8444
# For Postgres, set N8N_DATABASE=postgres in your env file.
services:
  n8n:
    image: docker.io/n8nio/n8n:2.19.5
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_PROTOCOL=https
      - N8N_PROXY_HOPS=1
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-https://localhost:8444}
      - N8N_WEBHOOK_URL=${N8N_EDITOR_BASE_URL:-https://localhost:8444}/
    extra_hosts:
      - "${N8N_HOST:-localhost}:host-gateway"
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: "wget -qO- http://127.0.0.1:5678/healthz || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n-data: {}
